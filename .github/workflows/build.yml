name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release:
        description: 'Create a release'
        required: false
        default: 'false'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            
          # Uncomment for multi-platform builds
          # - platform: macos-latest
          #   target: x86_64-apple-darwin
          # - platform: macos-latest
          #   target: aarch64-apple-darwin
          # - platform: ubuntu-22.04
          #   target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'python_backend/requirements.txt'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r python_backend/requirements.txt
          pip install pyinstaller

      - name: Install frontend dependencies
        run: npm ci

      # Windows-specific: Install Visual Studio Build Tools dependencies
      - name: Install Windows dependencies
        if: matrix.platform == 'windows-latest'
        run: |
          # Windows already has MSVC from the runner

      # Linux-specific: Install system dependencies
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # macOS-specific: Install system dependencies
      - name: Install macOS dependencies
        if: matrix.platform == 'macos-latest'
        run: |
          # macOS runner already has required dependencies

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'MediaForge ${{ github.ref_name }}'
          releaseBody: |
            ## What's New
            
            See the [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
            
            ## Downloads
            
            | Platform | Download |
            |----------|----------|
            | Windows (x64) | `.msi` or `.exe` installer |
            | macOS (Intel) | `.dmg` |
            | macOS (Apple Silicon) | `.dmg` |
            | Linux (x64) | `.AppImage` or `.deb` |
            
            ## Requirements
            
            - Python 3.10+ (bundled in future releases)
            - GPU acceleration: NVIDIA CUDA or AMD DirectML (optional)
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mediaforge-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb
          if-no-files-found: ignore
