# MediaForge Release Workflow
#
# SETUP (one-time):
#   1. Generate Tauri signing keypair:
#        npx tauri signer generate -w ~/.tauri/mediaforge.key
#   2. Add GitHub Secrets:
#        TAURI_SIGNING_PRIVATE_KEY       — private key content
#        TAURI_SIGNING_PRIVATE_KEY_PASSWORD — key password (leave empty if none)
#        AI_API_KEY                      — API key for release notes generation
#        AI_BASE_URL                     — (optional) custom base URL, default: https://api.openai.com/v1
#        AI_MODEL                        — (optional) model name, default: gpt-4o-mini
#   3. Set public key in src-tauri/tauri.conf.json → plugins.updater.pubkey
#
# USAGE:
#   GitHub → Actions → Release → Run workflow → enter version (e.g. 0.3.0)
#
# The workflow will automatically:
#   - Bump version in package.json / tauri.conf.json / Cargo.toml
#   - Generate release notes via AI (OpenAI-compatible API) from commits since the last tag
#   - Commit, tag, and push
#   - Build signed installers + latest.json (for auto-update)
#   - Publish a draft GitHub Release

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.3.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: false
        type: boolean

concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          # Uncomment to enable additional platforms:
          # - platform: macos-latest
          #   target: aarch64-apple-darwin
          # - platform: macos-latest
          #   target: x86_64-apple-darwin
          # - platform: ubuntu-22.04
          #   target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a PAT if your main branch has push protection that blocks GITHUB_TOKEN
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # ── Version bump ────────────────────────────────────────────────────────
      - name: Bump version
        run: node .github/scripts/bump-version.js ${{ inputs.version }}

      # ── AI-generated release notes ──────────────────────────────────────────
      - name: Generate release notes
        id: notes
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          VERSION: ${{ inputs.version }}
        run: python3 .github/scripts/gen-notes.py

      # ── Commit, tag, push ────────────────────────────────────────────────────
      - name: Commit and tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git commit -m "chore: release v${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          git push origin HEAD:main
          git push origin "v${{ inputs.version }}"

      # ── Platform dependencies ────────────────────────────────────────────────
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # ── Embed Python distribution (Windows) ─────────────────────────────────
      - name: Setup Python distribution
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path ./setup_python_dist.ps1) {
            ./setup_python_dist.ps1
          } else {
            Write-Host "setup_python_dist.ps1 not found, skipping"
          }

      # ── Frontend ─────────────────────────────────────────────────────────────
      - name: Install frontend dependencies
        run: npm ci

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v${{ inputs.version }}
          releaseName: MediaForge v${{ inputs.version }}
          releaseBody: ${{ steps.notes.outputs.notes }}
          releaseDraft: true
          prerelease: ${{ inputs.prerelease }}
          args: --target ${{ matrix.target }}
          includeUpdaterJson: true
